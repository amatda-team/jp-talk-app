<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>単語帳 - Phase 4 (Day System)</title>
<style>
  /* Eye-Care Palette & Soft Professional 테마 */
  body { 
    background-color: #F2F0EB;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", sans-serif; 
    margin: 0; 
    padding: 0;
    color: #1d1d1f; 
    -webkit-tap-highlight-color: transparent; 
  }

  .progress-container {
    width: 100%; height: 4px; background-color: #e5e5ea;
    position: fixed; top: 0; left: 0; z-index: 100;
  }
  .progress-bar {
    height: 100%; background-color: #A8B9A7;
    width: 0%; transition: width 0.3s ease;
  }
  .progress-text {
    text-align: center; font-size: 11px; color: #86868b;
    margin-top: 16px; font-weight: 600;
  }

  /* 상단 고정 복습 대시보드 */
  .review-dashboard {
    padding: 12px 20px 0 20px;
    display: flex;
    justify-content: center;
  }
  .btn-review-main {
    width: 100%; max-width: 350px; background: linear-gradient(135deg, #ff7675, #d63031);
    color: white; border: none; padding: 14px 0; border-radius: 16px;
    font-size: 15px; font-weight: 700; box-shadow: 0 4px 12px rgba(214, 48, 49, 0.25);
    cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-review-main:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(214, 48, 49, 0.35); }
  .btn-review-main:active { transform: scale(0.96) translateY(0); box-shadow: 0 2px 8px rgba(214, 48, 49, 0.2); }
  
  .review-badge {
    background: white; color: #d63031; padding: 2px 8px; border-radius: 12px;
    font-size: 13px; font-weight: 800;
  }

  /* 🌟 수정: Day 및 태그 필터 영역 */
  .header { 
    display: flex; overflow-x: auto; gap: 8px; 
    padding: 12px 20px 10px 20px; scrollbar-width: none; 
    padding-right: 30px; 
    align-items: center;
  }
  .header::-webkit-scrollbar { display: none; }
  .tag-chip { 
    padding: 8px 16px; background: #e8e8ed; border-radius: 20px; 
    font-size: 14px; font-weight: 600; color: #424245; white-space: nowrap; cursor: pointer;
    transition: all 0.2s ease;
  }
  .tag-chip:hover { background: #d1d1d6; }
  .tag-chip.active { background: #2c3e50; color: white; box-shadow: 0 4px 10px rgba(44, 62, 80, 0.2); }
  
  /* 🌟 신규: Day 칩 전용 스타일 (시각적 구분) */
  .day-chip { background: #DFE6E9; color: #2D3436; }
  .day-chip.active { background: #0984E3; color: white; box-shadow: 0 4px 10px rgba(9, 132, 227, 0.25); }

  /* 구분선 (Day와 태그 사이) */
  .divider { width: 1px; height: 20px; background-color: #d1d1d6; margin: 0 4px; flex-shrink: 0; }

  /* 카드 컨테이너 */
  .card-container { 
    display: flex; flex-direction: column; align-items: center; 
    padding: 0 20px calc(20px + env(safe-area-inset-bottom)); 
    margin-top: 5px; 
  }
  .card { 
    background: #FFFFFF; border-radius: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.06); 
    width: 100%; max-width: 350px; min-height: 380px; padding: 30px; box-sizing: border-box; 
    display: flex; flex-direction: column; position: relative; cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(0,0,0,0.08); }
  .card:active { transform: scale(0.98); }
  
  .word-tag { position: absolute; top: 20px; left: 24px; font-size: 12px; font-weight: 700; color: #86868b; }
  .view-count { position: absolute; top: 20px; right: 24px; font-size: 12px; color: #86868b; font-weight: 600; background: #f5f5f7; padding: 4px 10px; border-radius: 12px;}

  .front { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 42px; font-weight: 700; color: #1d1d1f; text-align: center; word-break: keep-all; margin-top: 30px; margin-bottom: 10px;}
  
  .back { display: none; text-align: center; width: 100%; animation: fadeIn 0.3s ease; }
  .card.flipped .back { display: block; }
  
  .reading { font-size: 18px; color: #86868b; margin-bottom: 8px; font-weight: 500;}
  .meaning { font-size: 20px; font-weight: 700; color: #2c3e50; line-height: 1.4; margin-bottom: 20px; word-break: keep-all;}
  
  .example-box { background: #fbfbfd; border-radius: 16px; padding: 16px; text-align: center; border: 1px solid #e5e5ea; }
  .ex-ja { font-size: 15px; color: #1d1d1f; margin-bottom: 8px; line-height: 1.5; font-weight: 600;}
  .ex-ko { font-size: 14px; color: #86868b; line-height: 1.4; }

  /* 버튼 UI */
  .buttons { display: flex; justify-content: center; gap: 12px; margin-top: 24px; width: 100%; max-width: 350px; }
  .btn { 
    flex: 1; padding: 18px 0; border: none; border-radius: 18px; 
    font-size: 16px; font-weight: 700; color: white; cursor: pointer; 
    box-shadow: 0 6px 16px rgba(0,0,0,0.1); transition: all 0.2s ease;
  }
  .btn-no { background-color: #D9A8A8; }
  .btn-no:hover { background-color: #cf9b9b; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(217, 168, 168, 0.4); }
  .btn-yes { background-color: #A8B9A7; }
  .btn-yes:hover { background-color: #9cb09b; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(168, 185, 167, 0.4); }
  .btn:active { transform: scale(0.95) translateY(0); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="progress-container">
  <div class="progress-bar" id="uiProgress"></div>
</div>
<div class="progress-text" id="uiProgressText">全体学習進捗: 0 / 0 (0%)</div>

<div class="review-dashboard">
  <button class="btn-review-main" onclick="filterBy('復習')">
    <span>🔥 復習モード (복습 모드)</span>
    <span class="review-badge" id="uiReviewCount">0</span>
  </button>
</div>

<div class="header" id="uiHeader"></div>

<div class="card-container">
  <div class="card" id="card" onclick="flipCard()">
    <div class="word-tag" id="uiTag">#タグ</div>
    <div class="view-count" id="uiViews">0 回</div>
    
    <div class="front" id="uiWord">単語</div>
    
    <div class="back">
      <div class="reading" id="uiReading">よみがな</div>
      <div class="meaning" id="uiMeaning">뜻</div>
      <div class="example-box" id="uiExampleBox">
        <div class="ex-ja" id="uiExJa">例文</div>
        <div class="ex-ko" id="uiExKo">예문 해석</div>
      </div>
    </div>
  </div>

  <div class="buttons">
    <button class="btn btn-no" onclick="mark(false)">分からない</button>
    <button class="btn btn-yes" onclick="mark(true)">分かる</button>
  </div>
</div>

<script src="data.js"></script>

<script>
  // 🌟 핵심 설정: 하루에 학습할 단어 개수
  const WORDS_PER_DAY = 30; 
  
  // 첫 화면을 전체(すべて)가 아닌 Day 1으로 강제 고정하여 체계적인 학습 유도
  let currentFilter = "Day 1"; 
  let filteredList = [];
  let currentCard = null;
  let userStats = JSON.parse(localStorage.getItem('noodVocaStats2')) || {};

  function init() {
    filterBy("Day 1"); 
  }

  function renderTags() {
    const header = document.getElementById('uiHeader');
    header.innerHTML = '';

    // 1. Day 버튼 자동 생성 로직
    const totalDays = Math.ceil(db.length / WORDS_PER_DAY);
    for(let i=1; i<=totalDays; i++) {
      const div = document.createElement('div');
      const isDayActive = currentFilter === `Day ${i}`;
      div.className = `tag-chip day-chip ${isDayActive ? 'active' : ''}`;
      div.innerText = `Day ${i}`;
      div.onclick = () => filterBy(`Day ${i}`);
      header.appendChild(div);
    }

    // 2. 시각적 구분선 추가
    const divider = document.createElement('div');
    divider.className = 'divider';
    header.appendChild(divider);

    // 3. 기존 태그(서브 기능) 버튼 생성
    const tags = ["すべて", ...new Set(db.map(w => w.tag))];
    tags.forEach(t => {
      const div = document.createElement('div');
      const isTagActive = currentFilter === t;
      div.className = `tag-chip ${isTagActive ? 'active' : ''}`;
      div.innerText = t === "すべて" ? "すべて" : `#${t}`;
      div.onclick = () => filterBy(t);
      header.appendChild(div);
    });
  }

  function filterBy(filterText) {
    if (navigator.vibrate) navigator.vibrate(20);
    currentFilter = filterText;
    renderTags(); // 헤더 버튼들의 활성화(active) 상태 업데이트
    
    if (filterText.startsWith("Day ")) {
      // 🌟 Day별 데이터 자르기 (Chunking) 로직
      const dayNum = parseInt(filterText.replace("Day ", ""));
      const startIndex = (dayNum - 1) * WORDS_PER_DAY;
      const endIndex = startIndex + WORDS_PER_DAY;
      filteredList = db.slice(startIndex, endIndex);

    } else if (filterText === "すべて") {
      filteredList = [...db];

    } else if (filterText === "復習") {
      filteredList = db.filter(w => userStats[w.id] && userStats[w.id].score === 0 && userStats[w.id].views > 0);
      if(filteredList.length === 0) {
        alert("素晴らしい！現在復習する単語がありません。(현재 복습할 단어가 없습니다.)");
        filterBy("Day 1"); // 복습할 게 없으면 다시 Day 1으로
        return;
      }
    } else {
      filteredList = db.filter(w => w.tag === filterText);
    }
    
    loadNextCard();
  }

  function loadNextCard() {
    if(filteredList.length === 0) return;
    
    let nextCard;
    if (filteredList.length > 1) {
      do {
        nextCard = filteredList[Math.floor(Math.random() * filteredList.length)];
      } while (currentCard && nextCard.id === currentCard.id);
    } else {
      nextCard = filteredList[0];
    }
    
    currentCard = nextCard;
    
    if(!userStats[currentCard.id]) {
      userStats[currentCard.id] = { views: 0, score: 0 };
    }
    
    document.getElementById('card').classList.remove('flipped');
    
    // 왼쪽 위 텍스트 표시 변경 (Day X, 복습중, 태그명)
    let displayTag = `#${currentCard.tag}`;
    if (currentFilter === '復習') displayTag = '🔥 復習中';
    else if (currentFilter.startsWith('Day ')) displayTag = `${currentFilter}`;
    
    document.getElementById('uiTag').innerText = displayTag;
    document.getElementById('uiViews').innerText = `${userStats[currentCard.id].views} 回`;
    document.getElementById('uiWord').innerText = currentCard.word;
    document.getElementById('uiReading').innerText = currentCard.reading;
    document.getElementById('uiMeaning').innerText = currentCard.meaning;
    
    if(currentCard.exJa && currentCard.exJa !== "-") {
      document.getElementById('uiExampleBox').style.display = 'block';
      document.getElementById('uiExJa').innerText = currentCard.exJa;
      document.getElementById('uiExKo').innerText = currentCard.exKo;
    } else {
      document.getElementById('uiExampleBox').style.display = 'none';
    }
  }

  function flipCard() {
    const card = document.getElementById('card');
    if (!card.classList.contains('flipped')) {
      card.classList.add('flipped');
      userStats[currentCard.id].views += 1;
      document.getElementById('uiViews').innerText = `${userStats[currentCard.id].views} 回`;
      saveStats();
    }
  }

  function mark(isKnown) {
    if (navigator.vibrate) navigator.vibrate(30);

    if(isKnown) {
      userStats[currentCard.id].score = 1; 
    } else {
      userStats[currentCard.id].score = 0;
    }
    saveStats();
    updateProgress();
    
    setTimeout(() => {
      loadNextCard();
    }, 150);
  }

  function updateProgress() {
    const learnedCount = db.filter(w => userStats[w.id] && userStats[w.id].score > 0).length;
    const totalCount = db.length;
    const percent = totalCount === 0 ? 0 : Math.round((learnedCount / totalCount) * 100);
    
    document.getElementById('uiProgress').style.width = `${percent}%`;
    document.getElementById('uiProgressText').innerText = `全体学習進捗 (전체 학습 진행률) : ${learnedCount} / ${totalCount} (${percent}%)`;

    const reviewCount = db.filter(w => userStats[w.id] && userStats[w.id].score === 0 && userStats[w.id].views > 0).length;
    document.getElementById('uiReviewCount').innerText = reviewCount;
  }

  function saveStats() {
    localStorage.setItem('noodVocaStats2', JSON.stringify(userStats));
  }

  window.onload = init;
</script>

</body>
</html>
